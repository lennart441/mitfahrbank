services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mitfahrbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-mitfahrbank}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mitfahrbank}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-mitfahrbank}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-mitfahrbank}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-me-use-32-chars-minimum!!}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3000/auth/callback}
      COMMUNITY_DESTINATIONS: ${COMMUNITY_DESTINATIONS:-Bahnhof,Supermarkt,Ärztezentrum}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
