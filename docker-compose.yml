services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mitfahrbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-mitfahrbank}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mitfahrbank} -d ${POSTGRES_DB:-mitfahrbank}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-mitfahrbank}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-mitfahrbank}
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-me-use-32-chars-minimum!!}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3000/auth/callback}
      WEB_PUSH_ENABLED: ${WEB_PUSH_ENABLED:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:mitfahrbank@example.local}
      FCM_ENABLED: ${FCM_ENABLED:-true}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-/app/secrets/firebase-service-account.json}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
    volumes:
      - ${FIREBASE_SERVICE_ACCOUNT_HOST_PATH:-./firebase-service-account.json}:/app/secrets/firebase-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
